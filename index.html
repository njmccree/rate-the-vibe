<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Rate the Vibe 🎵</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0c0b0f;--surf:rgba(255,255,255,.05);--bdr:rgba(255,255,255,.09);--or:#ff9340;--or-dim:rgba(255,147,64,.15);--or-bdr:rgba(255,147,64,.3);--tx:#f2ead8;--mu:rgba(242,234,216,.45);--r:16px}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--tx);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden}
  body{background-image:radial-gradient(ellipse at 10% 0%,rgba(80,20,120,.35) 0%,transparent 55%),radial-gradient(ellipse at 90% 90%,rgba(20,50,80,.3) 0%,transparent 55%)}
  .screen{display:none;flex-direction:column;align-items:center;min-height:100vh;padding:0 20px 40px}
  .screen.on{display:flex}
  .hero{margin-top:60px;text-align:center}
  .hi{font-size:52px}
  h1{font-family:'Playfair Display',serif;font-size:36px;font-weight:900;margin-top:10px;background:linear-gradient(135deg,#ff9340 20%,#ff5f5f);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .sub{color:var(--mu);font-size:14px;margin-top:6px}
  .card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:22px;width:100%;max-width:400px;margin-top:22px}
  .cl{font-size:11px;letter-spacing:1.3px;text-transform:uppercase;color:var(--mu);margin-bottom:13px}
  .eg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:13px}
  .eb{background:rgba(255,255,255,.05);border:2px solid transparent;border-radius:12px;padding:10px;font-size:24px;cursor:pointer;line-height:1}
  .eb.s{border-color:var(--or);background:var(--or-dim)}
  input{width:100%;background:rgba(255,255,255,.07);border:1px solid var(--bdr);border-radius:12px;padding:13px 15px;color:var(--tx);font-size:16px;font-family:'Outfit',sans-serif;outline:none;-webkit-appearance:none}
  input:focus{border-color:var(--or-bdr)}
  input::placeholder{color:var(--mu)}
  .bp{display:block;width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-family:'Outfit',sans-serif;font-weight:600;cursor:pointer;text-align:center;background:linear-gradient(135deg,#ff9340,#ff5f5f);color:#fff;margin-top:12px}
  .bp:disabled{opacity:.35;pointer-events:none}
  .bg{display:block;width:100%;padding:14px;border:1px solid var(--bdr);border-radius:12px;font-size:15px;font-family:'Outfit',sans-serif;font-weight:600;cursor:pointer;text-align:center;background:rgba(255,255,255,.06);color:var(--mu);margin-top:8px}
  .ropts{display:flex;flex-direction:column;gap:10px;width:100%;max-width:400px;margin-top:26px}
  .ropt{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:20px;cursor:pointer;text-align:left;width:100%}
  .ropt:active{border-color:var(--or-bdr);background:var(--or-dim)}
  .oi{font-size:26px;margin-bottom:6px}
  .ot{font-size:16px;font-weight:600;color:var(--tx)}
  .od{font-size:13px;color:var(--mu);margin-top:2px}
  #s-app{padding:0}
  .abar{width:100%;display:flex;justify-content:space-between;align-items:center;padding:13px 18px;border-bottom:1px solid var(--bdr);position:sticky;top:0;background:rgba(12,11,15,.9);backdrop-filter:blur(12px);z-index:10}
  .al{display:flex;align-items:center;gap:8px}
  .at{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;background:linear-gradient(135deg,#ff9340,#ff5f5f);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .dot{width:8px;height:8px;border-radius:50%;background:#4cd97b;flex-shrink:0}
  .dot.sync{background:var(--or);animation:blink .8s infinite}
  .dot.err{background:#ff5f5f}
  .mpill{background:var(--or-dim);border:1px solid var(--or-bdr);border-radius:20px;padding:4px 11px;font-size:12px;color:var(--or);white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis}
  .body{padding:14px 18px 90px;max-width:480px;margin:0 auto;width:100%}
  .codebar{background:var(--or-dim);border:1px solid var(--or-bdr);border-radius:12px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .codelbl{font-size:10px;letter-spacing:1px;color:var(--or);text-transform:uppercase;margin-bottom:2px}
  .codeval{font-family:monospace;font-size:20px;font-weight:800;letter-spacing:4px}
  .shbtn{background:var(--or);border:none;border-radius:8px;padding:7px 13px;color:#fff;font-size:13px;font-family:'Outfit',sans-serif;font-weight:600;cursor:pointer;white-space:nowrap}
  .tabs{display:flex;gap:8px;margin-bottom:14px}
  .tab{flex:1;padding:9px;border:1px solid var(--bdr);background:var(--surf);border-radius:10px;color:var(--mu);font-size:12px;font-family:'Outfit',sans-serif;cursor:pointer}
  .tab.a{border-color:var(--or-bdr);background:var(--or-dim);color:var(--or)}
  .addb{width:100%;padding:13px;background:rgba(255,147,64,.07);border:1.5px dashed var(--or-bdr);border-radius:12px;color:var(--or);font-size:13px;font-family:'Outfit',sans-serif;cursor:pointer;margin-bottom:12px;display:block}
  .addform{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;display:flex;flex-direction:column;gap:9px;margin-bottom:12px}
  .row{display:flex;gap:8px}
  .bsm{padding:10px 14px;font-size:13px}
  .sc{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;margin-bottom:10px}
  .sc.now{background:rgba(255,147,64,.06);border-color:rgba(255,147,64,.22);box-shadow:0 0 24px rgba(255,147,64,.07)}
  .ntag{font-size:9px;letter-spacing:1.5px;color:var(--or);font-weight:700;margin-bottom:6px;font-family:monospace}
  .stit{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;line-height:1.2}
  .sart{color:var(--mu);font-size:13px;margin-top:2px}
  .smet{font-size:10px;color:rgba(242,234,216,.28);margin-top:5px}
  .avgr{display:flex;align-items:baseline;gap:7px;margin-top:10px}
  .avgn{font-family:'Playfair Display',serif;font-size:38px;color:var(--or);line-height:1}
  .avgs{font-size:11px;color:var(--mu)}
  .rb{display:inline-block;padding:9px 14px;background:rgba(255,147,64,.12);border:1px solid var(--or-bdr);border-radius:10px;color:var(--or);font-size:13px;font-family:'Outfit',sans-serif;cursor:pointer;margin-top:10px}
  .rb:active{background:var(--or-dim)}
  .chips{margin-top:10px;padding-top:10px;border-top:1px solid var(--bdr);display:flex;flex-wrap:wrap;gap:5px}
  .chip{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.06);border-radius:20px;padding:4px 9px;font-size:11px}
  .cst{color:var(--or);letter-spacing:-2px;font-size:10px}
  .empty{text-align:center;padding:50px 20px;opacity:.4}
  .ei{font-size:40px;margin-bottom:8px}
  .et{font-size:16px;font-weight:600}
  .es{font-size:12px;color:var(--mu);margin-top:3px}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:none;align-items:flex-end;backdrop-filter:blur(4px)}
  .overlay.on{display:flex}
  .modal{background:#17151e;border:1px solid var(--bdr);border-radius:20px 20px 0 0;padding:26px 18px 50px;width:100%;max-width:480px;margin:0 auto;animation:sup .22s ease-out}
  .mt{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;margin-bottom:3px}
  .ma{color:var(--mu);font-size:13px;margin-bottom:18px}
  .mst{display:flex;gap:2px;margin-bottom:6px}
  .ms{font-size:42px;cursor:pointer;color:rgba(255,255,255,.1);padding:4px;line-height:1;-webkit-user-select:none;user-select:none}
  .ms.l{color:var(--or);text-shadow:0 0 14px rgba(255,147,64,.5)}
  .ms:active{transform:scale(1.15)}
  .ml{font-size:14px;color:var(--mu);font-style:italic;min-height:20px;margin-bottom:18px}
  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:rgba(28,26,36,.97);border:1px solid var(--bdr);border-radius:20px;padding:9px 18px;font-size:13px;z-index:200;backdrop-filter:blur(10px);white-space:nowrap;animation:fin .2s ease-out}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  @keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @keyframes fin{from{opacity:0;transform:translateX(-50%) translateY(6px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>

<!-- SETUP -->

<div class="screen on" id="s-setup">
  <div class="hero"><div class="hi">🎵</div><h1>Rate the Vibe</h1><p class="sub">Real-time song ratings with your crew</p></div>
  <div class="card">
    <div class="cl">Pick your vibe</div>
    <div class="eg" id="egrid"></div>
    <input type="text" id="name-in" placeholder="Your name..." maxlength="20" autocomplete="off">
    <button class="bp" id="btn-next" disabled>Continue →</button>
  </div>
</div>

<!-- ROOM -->

<div class="screen" id="s-room">
  <div class="hero"><div class="hi">🎧</div><h1>Your Session</h1><p class="sub">Create or join a room</p></div>
  <div class="ropts">
    <button class="ropt" id="btn-create">
      <div class="oi">✨</div><div class="ot">Create a Room</div>
      <div class="od" id="create-desc">Get a code to share with your crew</div>
    </button>
    <div style="color:var(--mu);font-size:13px;text-align:center">— or —</div>
    <div class="card" style="margin-top:0">
      <div class="cl">Join a Room</div>
      <input type="text" id="join-in" placeholder="ROOM CODE" autocomplete="off" autocapitalize="characters"
        style="text-transform:uppercase;letter-spacing:4px;font-size:22px;font-weight:700;text-align:center">
      <button class="bp" id="btn-join" disabled>Join →</button>
    </div>
    <button class="bg" id="btn-back">← Back</button>
  </div>
</div>

<!-- APP -->

<div class="screen" id="s-app">
  <div class="abar">
    <div class="al"><span style="font-size:20px">🎵</span><span class="at">Rate the Vibe</span></div>
    <div style="display:flex;align-items:center;gap:7px">
      <span class="dot" id="dot"></span>
      <div class="mpill" id="me-pill"></div>
    </div>
  </div>
  <div class="body">
    <div class="codebar">
      <div><div class="codelbl">Room Code — share with friends</div><div class="codeval" id="code-val">——</div></div>
      <button class="shbtn" id="btn-share">Share 📤</button>
    </div>
    <div class="tabs">
      <button class="tab a" data-tab="now">🎧 Now Playing</button>
      <button class="tab" data-tab="hist">📜 History (<span id="hist-n">0</span>)</button>
    </div>
    <div id="tab-now">
      <button class="addb" id="btn-show-form">+ Add the song that's playing</button>
      <div class="addform" id="add-form" style="display:none">
        <div style="font-weight:600;font-size:14px">What's playing? 🎵</div>
        <input type="text" id="title-in" placeholder="Song title..." autocomplete="off">
        <input type="text" id="artist-in" placeholder="Artist..." autocomplete="off">
        <div class="row">
          <button class="bg bsm" style="flex:1;margin:0" id="btn-cancel-form">Cancel</button>
          <button class="bp bsm" style="flex:2;margin:0" id="btn-add-song" disabled>Add Song</button>
        </div>
      </div>
      <div id="now-area"></div>
    </div>
    <div id="tab-hist" style="display:none"><div id="hist-area"></div></div>
  </div>
</div>

<!-- MODAL -->

<div class="overlay" id="modal">
  <div class="modal">
    <div class="mt" id="m-title">—</div><div class="ma" id="m-artist">—</div>
    <div class="mst" id="m-stars"></div>
    <div class="ml" id="m-label">Tap a star to rate</div>
    <button class="bp" id="m-submit" disabled>Submit Rating</button>
    <button class="bg" id="m-cancel">Cancel</button>
  </div>
</div>

<script>
const EMOJIS=['🎵','🎸','🥁','🎹','🎺','🎻','🎤','🎧','🦄','🔥','💫','⚡'];
const LABELS=['','Trash 🗑️','Meh 😑','Decent 👍','Banger 🔥','GOAT 🐐'];
const API = 'https://www.jsonstore.io';

let myId=localStorage.getItem('rtv-id')||(()=>{const i=uid();localStorage.setItem('rtv-id',i);return i;})();
let myName=localStorage.getItem('rtv-name')||'';
let myEmoji=localStorage.getItem('rtv-emoji')||'🎵';
let roomCode=null,state=null,lastStr='',pollTimer=null,curTab='now',mSongId=null,mStars=0;

function uid(){return Math.random().toString(36).slice(2,8).toUpperCase()}
function timeAgo(ts){const s=(Date.now()-ts)/1e3;if(s<60)return 'just now';if(s<3600)return Math.floor(s/60)+'m ago';return Math.floor(s/3600)+'h ago'}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));document.getElementById(id).classList.add('on')}
function setDot(s){const d=document.getElementById('dot');if(!d)return;d.className='dot'+(s==='sync'?' sync':s==='err'?' err':'')}
let _tt; function toast(msg){let t=document.querySelector('.toast');if(!t){t=document.createElement('div');t.className='toast';document.body.appendChild(t);}t.textContent=msg;clearTimeout(_tt);_tt=setTimeout(()=>t?.remove(),3000)}

async function apiGet(code){
  const r=await fetch(`${API}/${code}`,{headers:{'Accept':'application/json'}});
  if(!r.ok)throw new Error('HTTP '+r.status);
  const d=await r.json();
  return d.result||null;
}
async function apiSet(code,data){
  const r=await fetch(`${API}/${code}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  if(!r.ok)throw new Error('HTTP '+r.status);
  return data;
}

async function mergeAndSave(fn){
  setDot('sync');
  try{
    const d=(await apiGet(roomCode))||{songs:[],users:{}};
    fn(d);
    d.users[myId]={name:myName,emoji:myEmoji};
    await apiSet(roomCode,d);
    state=d;lastStr=JSON.stringify(d);
    renderApp();setDot('ok');
  }catch(e){
    setDot('err');toast('⚠️ Sync error: '+e.message);throw e;
  }
}

function startPolling(){
  if(pollTimer)clearInterval(pollTimer);
  pollTimer=setInterval(async()=>{
    try{
      const d=await apiGet(roomCode);if(!d)return;
      const s=JSON.stringify(d);
      if(s!==lastStr){state=d;lastStr=s;renderApp();}
      setDot('ok');
    }catch(e){setDot('err');}
  },3000);
}

// Setup
const egrid=document.getElementById('egrid');
EMOJIS.forEach(e=>{
  const b=document.createElement('button');b.className='eb'+(e===myEmoji?' s':'');b.textContent=e;
  b.onclick=()=>{myEmoji=e;localStorage.setItem('rtv-emoji',e);egrid.querySelectorAll('.eb').forEach(x=>x.classList.toggle('s',x.textContent===e));};
  egrid.appendChild(b);
});
const nameIn=document.getElementById('name-in'),btnNext=document.getElementById('btn-next');
nameIn.value=myName;if(myName)btnNext.disabled=false;
nameIn.oninput=()=>btnNext.disabled=!nameIn.value.trim();
nameIn.onkeydown=e=>{if(e.key==='Enter')btnNext.click();};
btnNext.onclick=()=>{myName=nameIn.value.trim();localStorage.setItem('rtv-name',myName);showScreen('s-room');};

// Room
document.getElementById('btn-back').onclick=()=>showScreen('s-setup');
document.getElementById('btn-create').onclick=async function(){
  const desc=document.getElementById('create-desc');
  this.style.opacity='0.5';this.style.pointerEvents='none';desc.textContent='Creating…';
  try{
    const code=uid();
    await apiSet(code,{songs:[],users:{[myId]:{name:myName,emoji:myEmoji}}});
    roomCode=code;state=await apiGet(code)||{songs:[],users:{}};lastStr=JSON.stringify(state);
    launchApp();startPolling();
  }catch(e){
    toast('⚠️ '+e.message);desc.textContent='Get a code to share with your crew';
    this.style.opacity='';this.style.pointerEvents='';
  }
};

const joinIn=document.getElementById('join-in'),btnJoin=document.getElementById('btn-join');
joinIn.oninput=()=>btnJoin.disabled=joinIn.value.trim().length<4;
joinIn.onkeydown=e=>{if(e.key==='Enter'&&!btnJoin.disabled)btnJoin.click();};
btnJoin.onclick=async function(){
  const code=joinIn.value.trim().toUpperCase();
  this.textContent='Joining…';this.disabled=true;
  try{
    const d=await apiGet(code);
    if(!d)throw new Error('Room not found — check the code');
    roomCode=code;state=d;lastStr=JSON.stringify(d);
    await mergeAndSave(s=>{s.users[myId]={name:myName,emoji:myEmoji};});
    launchApp();startPolling();
  }catch(e){
    toast('⚠️ '+e.message);this.textContent='Join →';this.disabled=false;
  }
};

function launchApp(){
  document.getElementById('me-pill').textContent=myEmoji+' '+myName;
  document.getElementById('code-val').textContent=roomCode;
  showScreen('s-app');renderApp();
}

document.getElementById('btn-share').onclick=()=>{
  const msg=`Join my Rate the Vibe session 🎵\nOpen the app → "Join a Room" → enter:\n\n  ${roomCode}`;
  if(navigator.share)navigator.share({title:'Rate the Vibe',text:msg});
  else navigator.clipboard?.writeText(roomCode).then(()=>toast('📋 Code copied!'));
};

document.querySelectorAll('.tab').forEach(t=>{
  t.onclick=()=>{curTab=t.dataset.tab;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('a'));t.classList.add('a');document.getElementById('tab-now').style.display=curTab==='now'?'block':'none';document.getElementById('tab-hist').style.display=curTab==='hist'?'block':'none';};
});

document.getElementById('btn-show-form').onclick=()=>{document.getElementById('btn-show-form').style.display='none';document.getElementById('add-form').style.display='flex';document.getElementById('title-in').focus();};
document.getElementById('btn-cancel-form').onclick=resetForm;
document.getElementById('title-in').oninput=function(){document.getElementById('btn-add-song').disabled=!this.value.trim();};
document.getElementById('btn-add-song').onclick=async function(){
  const title=document.getElementById('title-in').value.trim(),artist=document.getElementById('artist-in').value.trim()||'Unknown Artist';
  if(!title)return;const id=uid();resetForm();
  await mergeAndSave(s=>{s.songs.unshift({id,title,artist,addedBy:myId,addedByName:myName,addedByEmoji:myEmoji,addedAt:Date.now(),ratings:{}});});
};
function resetForm(){document.getElementById('title-in').value='';document.getElementById('artist-in').value='';document.getElementById('btn-add-song').disabled=true;document.getElementById('add-form').style.display='none';document.getElementById('btn-show-form').style.display='block';}

function renderApp(){
  if(!state)return;
  const songs=state.songs||[],users=state.users||{},cur=songs[0]||null,hist=songs.slice(1);
  document.getElementById('hist-n').textContent=hist.length;
  const na=document.getElementById('now-area');
  if(cur){na.innerHTML=cardHTML(cur,users,true);na.querySelector('.rb')?.addEventListener('click',()=>openModal(cur.id));}
  else na.innerHTML=`<div class="empty"><div class="ei">🎵</div><div class="et">Nothing playing yet</div><div class="es">Tap above to add the current song</div></div>`;
  const ha=document.getElementById('hist-area');
  if(!hist.length)ha.innerHTML=`<div class="empty"><div class="ei">📜</div><div class="et">No history yet</div><div class="es">Songs move here when you add a new one</div></div>`;
  else{ha.innerHTML=hist.map(s=>cardHTML(s,users,false)).join('');ha.querySelectorAll('.rb').forEach(b=>b.addEventListener('click',()=>openModal(b.dataset.id)));}
}
function cardHTML(song,users,isCur){
  const rt=song.ratings||{},vs=Object.values(rt).map(r=>r.stars);
  const avg=vs.length?(vs.reduce((a,b)=>a+b,0)/vs.length).toFixed(1):null;
  const myR=rt[myId]?.stars||0,by=users[song.addedBy]||{};
  const chips=Object.entries(rt).map(([id,r])=>{const u=users[id]||{};return `<div class="chip">${u.emoji||'🎵'} <span style="color:rgba(242,234,216,.75)">${esc(u.name||'?')}</span> <span class="cst">${'★'.repeat(r.stars)}</span></div>`;}).join('');
  return `<div class="sc ${isCur?'now':''}">
    ${isCur?'<div class="ntag">▶ NOW PLAYING</div>':''}
    <div class="stit">${esc(song.title)}</div><div class="sart">${esc(song.artist)}</div>
    <div class="smet">${timeAgo(song.addedAt)} · ${by.emoji||'🎵'} ${esc(by.name||'someone')}</div>
    ${avg?`<div class="avgr"><div class="avgn">${avg}</div><div class="avgs">avg · ${vs.length} rating${vs.length!==1?'s':''}</div></div>`:''}
    <button class="rb" data-id="${song.id}">${myR?'★'.repeat(myR)+' · '+LABELS[myR]:'⭐ Rate this song'}</button>
    ${chips?`<div class="chips">${chips}</div>`:''}
  </div>`;
}

function openModal(songId){
  const song=state?.songs?.find(s=>s.id===songId);if(!song)return;
  mSongId=songId;mStars=song.ratings?.[myId]?.stars||0;
  document.getElementById('m-title').textContent=song.title;document.getElementById('m-artist').textContent=song.artist;
  document.getElementById('m-submit').textContent=mStars?'Update Rating':'Submit Rating';document.getElementById('m-submit').disabled=(mStars===0);
  buildStars(mStars);document.getElementById('modal').classList.add('on');
}
function buildStars(lit){
  const c=document.getElementById('m-stars');c.innerHTML='';
  [1,2,3,4,5].forEach(s=>{const b=document.createElement('span');b.className='ms'+(s<=lit?' l':'');b.textContent='★';
    b.onclick=()=>{mStars=s;buildStars(s);document.getElementById('m-label').textContent=LABELS[s];document.getElementById('m-submit').disabled=false;document.getElementById('m-submit').textContent='Submit Rating';};c.appendChild(b);});
  document.getElementById('m-label').textContent=lit?LABELS[lit]:'Tap a star to rate';
}
function closeModal(){document.getElementById('modal').classList.remove('on');mSongId=null;mStars=0;}
document.getElementById('m-cancel').onclick=closeModal;
document.getElementById('modal').onclick=e=>{if(e.target===e.currentTarget)closeModal();};
document.getElementById('m-submit').onclick=async function(){
  if(!mSongId||!mStars)return;const sid=mSongId,st=mStars;closeModal();
  await mergeAndSave(s=>{const song=s.songs.find(x=>x.id===sid);if(!song)return;if(!song.ratings)song.ratings={};song.ratings[myId]={stars:st,name:myName,emoji:myEmoji,ratedAt:Date.now()};});
};
</script>
